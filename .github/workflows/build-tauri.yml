name: Build Tauri Desktop App

on:
  push:
    branches: ["main"]
    paths:
      - "web-client/**"
      - ".github/workflows/build-tauri.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "web-client/**"
      - ".github/workflows/build-tauri.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.job_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            job_name: Linux + Windows NSIS
            build_linux: true
            build_windows_on_linux: true
          - os: macos-latest
            job_name: macOS Universal
            tauri_args: --target universal-apple-darwin

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: web-client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-client/package-lock.json

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        working-directory: .
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libudev-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            nsis \
            lld \
            llvm

      - name: Setup Rust toolchain
        if: matrix.os == 'ubuntu-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Rust toolchain for macOS universal build
        if: matrix.os == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: web-client/src-tauri -> target

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Install cargo-xwin
        if: matrix.os == 'ubuntu-latest'
        run: cargo install --locked cargo-xwin

      - name: Build Linux bundles
        if: matrix.build_linux
        run: npm run tauri:build -- --bundles appimage deb

      - name: Build Windows NSIS on Linux
        if: matrix.build_windows_on_linux
        run: npm run tauri:build -- --runner cargo-xwin --target x86_64-pc-windows-msvc

      - name: Build Tauri app for macOS universal target
        if: matrix.os == 'macos-latest'
        run: npm run tauri:build -- ${{ matrix.tauri_args }}

      - name: Upload Linux artifacts
        if: matrix.build_linux
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: |
            web-client/src-tauri/target/release/bundle/appimage/*.AppImage
            web-client/src-tauri/target/release/bundle/appimage/*.AppImage.sig
            web-client/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows artifacts
        if: matrix.build_windows_on_linux
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            web-client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            web-client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: |
            web-client/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            web-client/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            web-client/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 30
