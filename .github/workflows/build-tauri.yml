name: Build Tauri Desktop App

on:
  push:
    branches: ["main"]
    paths:
      - "web-client/**"
      - ".github/workflows/build-tauri.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "web-client/**"
      - ".github/workflows/build-tauri.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: tauri-windows
            artifact_path: |
              web-client/src-tauri/target/release/bundle/nsis/*.exe
              web-client/src-tauri/target/release/bundle/nsis/*.exe.zip
          - os: macos-latest
            artifact_name: tauri-macos
            tauri_args: --target universal-apple-darwin
            artifact_path: |
              web-client/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              web-client/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
              web-client/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: web-client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-client/package-lock.json

      - name: Setup Rust toolchain
        if: matrix.os != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust toolchain for macOS universal build
        if: matrix.os == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: web-client/src-tauri -> target

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Check architecture dependencies
        run: npm run check:deps

      - name: Type check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:run

      - name: Build Tauri app
        if: matrix.os != 'macos-latest'
        run: npm run tauri:build

      - name: Build Tauri app for macOS universal target
        if: matrix.os == 'macos-latest'
        run: npm run tauri:build -- ${{ matrix.tauri_args }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 30
